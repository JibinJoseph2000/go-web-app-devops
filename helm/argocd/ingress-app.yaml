apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/JibinJoseph2000/go-web-app-devops.git
    targetRevision: main
    path: helm/platform/ingress-nginx

    helm:
      chart: ingress-nginx
      repo: https://kubernetes.github.io/ingress-nginx
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
